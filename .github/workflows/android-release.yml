name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-28 platforms;android-29 platforms;android-37.0 build-tools;36.0.0

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
            echo "storeFile=release.keystore" >> local.properties
            echo "keyAlias=$KEY_ALIAS" >> local.properties
            echo "storePassword=$KEY_PASSWORD" >> local.properties
            echo "Signing configured with release keystore"
          else
            echo "No signing secrets — APK signed with debug key (cannot update existing install)"
          fi
          cat local.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: List build variants
        run: ./gradlew :app:tasks --all 2>&1 | grep -E "assemble.*Release$" | head -20

      - name: Install host Python 3.10 (Chaquopy v17 buildPython)
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.10 python3.10-venv python3.10-distutils
          python3.10 --version
          python3.10 -m venv --help >/dev/null

      - name: Build mobile-arm64
        run: ./gradlew :app:assembleMobileArm64_v8a${{ inputs.build_type || 'Release' }}

      - name: Build mobile-armv7
        run: ./gradlew :app:assembleMobileArmeabi_v7a${{ inputs.build_type || 'Release' }}

      - name: Build leanback-arm64
        run: ./gradlew :app:assembleLeanbackArm64_v8a${{ inputs.build_type || 'Release' }}

      - name: Build leanback-armv7
        run: ./gradlew :app:assembleLeanbackArmeabi_v7a${{ inputs.build_type || 'Release' }}

      - name: Collect APKs
        id: collect
        run: |
          mkdir -p dist
          find app/build/outputs/apk -name "*.apk" -type f -exec cp -v {} dist/ \;
          ls -la dist/

      - name: Generate update JSON manifests
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION_CODE="$(grep -m1 'versionCode' app/build.gradle | awk '{print $2}')"
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          for apk in dist/*.apk; do
            base=$(basename "$apk" .apk)
            cat > "dist/${base}.json" << JSONEOF
          {
            "name": "${{ github.ref_name }}",
            "desc": "${{ github.ref_name }} — $SHORT_SHA",
            "code": $VERSION_CODE
          }
          JSONEOF
            echo "Generated dist/${base}.json code=$VERSION_CODE"
          done

      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cat > dist/release-notes.md << 'NOTESEOF'
          ## ${{ github.ref_name }} — Release

          Built automatically by GitHub Actions. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full changelog.

          ### 4 个 APK 产物

          - `mobile-arm64_v8a.apk` — 手机端 arm64 (v8a)
          - `mobile-armeabi_v7a.apk` — 手机端 armv7
          - `leanback-arm64_v8a.apk` — TV 端 arm64 (v8a)
          - `leanback-armeabi_v7a.apk` — TV 端 armv7

          ### 兼容性提示

          - 远程 JAR 必须带 `;sha256;` 否则不加载
          - Android 11+ 文件管理走 SAF，不再申请 `MANAGE_EXTERNAL_STORAGE`
          - 自更新改为导出到 Downloads 通知用户手动安装
          - 旧设备（Android ≤ 10）行为不变
          NOTESEOF

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file dist/release-notes.md \
            dist/*.apk dist/*.json

      - name: Check mirror availability
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -z "${{ secrets.CNB_TOKEN }}" ]; then
            echo "::warning title=CNB Mirror Sync Disabled::CNB_TOKEN secret is not configured. Update mirror (cnb.cool) will NOT receive new APKs. Go to Settings → Secrets → Actions to add it."
          else
            echo "CNB_TOKEN configured, mirror sync will run."
          fi

      - name: Sync to mirror
        if: startsWith(github.ref, 'refs/tags/v') && env.CNB_TOKEN != ''
        continue-on-error: true
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          rm -rf cnb-mirror
          git clone --depth 1 "https://cnb:$CNB_TOKEN@cnb.cool/code_free/webtv.git" cnb-mirror 2>&1 || { echo "WARNING: CNB clone failed, skipping mirror sync"; exit 0; }
          mkdir -p cnb-mirror/apk
          cp dist/*.apk dist/*.json cnb-mirror/apk/
          cd cnb-mirror
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/
          git diff --cached --quiet && { echo "No changes to push to CNB"; exit 0; }
          git commit -m "${{ github.ref_name }}"
          git push origin HEAD:main 2>&1 || echo "WARNING: CNB push failed"

      - name: Upload APKs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webtv-apks-${{ github.ref_name }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30
